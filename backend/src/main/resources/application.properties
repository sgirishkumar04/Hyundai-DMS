spring.application.name=hyundai-dms

# ── Database ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/hyundai_dms?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Server ────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api/v1
server.error.include-message=always
server.error.include-stacktrace=always

# ── Performance (Compression) ──────────────────────────────────
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=2048

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=HyundaiDmsSupersecretKeyThatIsAtLeast256BitsLong2026!
jwt.expiration.ms=604800000

# ── Logging ───────────────────────────────────────────────────
logging.level.com.hyundai.dms=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ── Reliability (Actuator) ────────────────────────────────────
management.endpoints.web.base-path=/monitor
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=Hyundai Dealer Management System
info.app.description=Production-grade DMS
info.app.version=1.0.0
