spring.application.name=hyundai-dms

# ── Database ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/hyundai_dms?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Server ────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api/v1
server.error.include-message=always
server.error.include-stacktrace=always

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=HyundaiDmsSupersecretKeyThatIsAtLeast256BitsLong2026!
jwt.expiration.ms=86400000

# ── Logging ───────────────────────────────────────────────────
logging.level.com.hyundai.dms=INFO
logging.level.org.springframework.security=WARN
